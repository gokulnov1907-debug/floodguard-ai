<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logicore</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="Predict.css"/>
</head>
<body>
 
  <!-- ═══════════════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════════ -->
  <nav>
  <div class="nav-logo">
    <img src="Capture.PNG" alt="Logo" />
    <span class="nav-logo-text">Logicore.</span>
  </div>

  <div class="nav-links">
    <a href="Home.html" id="Home">Home</a>
    <a href="Predict.html" id="Predict">Predict</a>
  </div>
</nav>
  <!-- ═══════════════════════════════════════════
       HERO SECTION
  ═══════════════════════════════════════════ -->
  <section class="hero">
 
    <!-- Dot/grid texture overlay -->
    <div class="hero-grid"></div>
 
    <!-- Decorative diagonal lines -->
    <div class="hero-lines">
      <svg viewBox="0 0 800 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Left diagonal lines -->
        <line x1="0"   y1="400" x2="280" y2="0"   stroke="white" stroke-width="0.8"/>
        <line x1="40"  y1="400" x2="310" y2="0"   stroke="white" stroke-width="0.8"/>
        <line x1="80"  y1="400" x2="340" y2="0"   stroke="white" stroke-width="0.8"/>
        <!-- Right diagonal lines -->
        <line x1="800" y1="400" x2="520" y2="0"   stroke="white" stroke-width="0.8"/>
        <line x1="760" y1="400" x2="490" y2="0"   stroke="white" stroke-width="0.8"/>
        <line x1="720" y1="400" x2="460" y2="0"   stroke="white" stroke-width="0.8"/>
        <!-- Horizontal subtle lines -->
        <line x1="0"   y1="200" x2="800" y2="200" stroke="white" stroke-width="0.4" opacity="0.4"/>
        <line x1="0"   y1="300" x2="800" y2="300" stroke="white" stroke-width="0.4" opacity="0.3"/>
      </svg>
    </div>
        <!-- ── Hero Content ── -->
    <div class="hero-content">
 
      <!-- HEADLINE TEXT: "Check Flood Risk in Your City" -->
      <h1 class="hero-headline">
        Check Flood Risk in<br>
        <span class="accent">Your City</span>
      </h1>
 
      <!-- Input + Button row -->
      <div class="predict-form">
 
        <!-- INPUT PLACEHOLDER: "Enter your location" -->
        <input
          type="text"
          class="city-input"
          placeholder="Enter your location"
        />
 
        <!-- BUTTON TEXT: "Predict" -->
        <button class="btn-predict">Predict</button>
 
      </div>
 
    </div>
 
  </section>
 
  <footer></footer>
  <script src="Predict.js"></script>
 
</body>
</html>
